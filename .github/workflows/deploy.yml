name: Deploy to GitHub Pages

permissions:
  contents: write
  
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20 (required for Supabase 2.98+)
        uses: actions/setup-node@v4
        with:
          node-version: 20   # Энд 20 эсвэл 22 сонго (22 илүү шинэ, LTS)
          cache: 'npm'       # npm cache ашиглаж хурдан болго

      - name: Install dependencies (use npm install first to sync lockfile if needed)
        run: |
          npm install --package-lock-only   # Lock file-г шинэчил (sync хий)
          npm ci                            # Одоо ci ажиллах ёстой

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: www.negdi.mn
